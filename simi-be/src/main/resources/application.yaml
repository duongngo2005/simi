spring:
  application:
    name: simi-be
  datasource:
    url: jdbc:mysql://localhost:3306/simi_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 65MB

server:
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: U21hcnREaWdpdGFsTGlicmFyeVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA
    access-expiration-ms: 1800000
    refresh-expiration-ms: 604800000


