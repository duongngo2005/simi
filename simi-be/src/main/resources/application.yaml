spring:
  application:
    name: simi-be
  datasource:
    url: jdbc:mysql://localhost:3306/simi_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 65MB

server:
  servlet:
    context-path: /api/v1


